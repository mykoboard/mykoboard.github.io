name: Build and Deploy with Bun

on:
  push:
    branches:
      - main   # or whatever branch you want to deploy from

permissions:
  contents: write   # needed so the Action can push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mykoboard
        uses: actions/checkout@v6
        with:
          path: mykoboard
          fetch-depth: 0

      - name: Checkout apex-nebula
        uses: actions/checkout@v6
        with:
          repository: mykoboard/apex-nebula
          path: apex-nebula

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: mykoboard

      - name: Build
        run: bun run build:all
        working-directory: mykoboard

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages       # branch to push to
          publish_dir: ./mykoboard/docs            # folder with built files
          commit_message: "Deploy from ${GITHUB_SHA}"
